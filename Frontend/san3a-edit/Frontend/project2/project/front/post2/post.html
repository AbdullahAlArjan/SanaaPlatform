<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana'a - Freelance Platform</title>
    <link rel="stylesheet" href="post.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <header>
        <nav class="nav-container">
            <a href="../main page/index.html" class="logo">Sana'a</a>
            <div class="auth-buttons">
                <button class="login-btn" onclick="window.location.href='Login/login.html'">Login</button>
                <button class="register-btn" onclick="window.location.href='Login/register.html'">Register</button>
            </div>
        </nav>
    </header>

    <!-- Sorting Controls -->
    <div class="sort-container">
        <select id="sortOptions">
            <option value="rating_high">Highest Rating</option>
            <option value="rating_low">Lowest Rating</option>
            <option value="price_high">Highest Price</option>
            <option value="price_low">Lowest Price</option>
        </select>
    </div>

    <!-- Posts Grid -->
    <main class="posts-container" id="postsContainer">
        <!-- Post Card 1 -->
        <div class="post-card" data-rating="4.8" data-price="100" onclick="window.location.href='Service/Service.html?id=1'">
            <img src="images/logo1.png" alt="Logo Design" class="post-image">
            <div class="post-details">
                <h3>Logo Design</h3>
                <div class="price-rating">
                    <span class="price">$100</span>
                    <div class="rating">⭐ 4.8</div>
                </div>
                <div class="provider-info">
                    <img src="images/a2.jpeg" alt="Abd" class="provider-image">
                    <span>Abd</span>
                </div>
            </div>
        </div>

        <!-- Post Card 2 -->
        <div class="post-card" data-rating="4.9" data-price="500" onclick="window.location.href='Service/Service.html?id=2'">
            <img src="images/service2.jpg" alt="WebSite Design" class="post-image">
            <div class="post-details">
                <h3>WebSite Design</h3>
                <div class="price-rating">
                    <span class="price">$500</span>
                    <div class="rating">⭐ 4.9</div>
                </div>
                <div class="provider-info">
                    <img src="images/provider2.jpg" alt="Sarah Mohammed" class="provider-image">
                    <span>Sarah Mohammed</span>
                </div>
            </div>
        </div>

        <!-- Post Card 3 -->
        <div class="post-card" data-rating="4.5" data-price="150" onclick="window.location.href='Service/Service.html?id=3'">
            <img src="images/service3.jpg" alt="Landscape Design" class="post-image">
            <div class="post-details">
                <h3>Landscape Design</h3>
                <div class="price-rating">
                    <span class="price">$150</span>
                    <div class="rating">⭐ 4.5</div>
                </div>
                <div class="provider-info">
                    <img src="images/provider3.jpg" alt="Omar Khaled" class="provider-image">
                    <span>Omar Khaled</span>
                </div>
            </div>
        </div>

        <!-- Post Card 4 -->
        <div class="post-card" data-rating="4.7" data-price="300" onclick="window.location.href='Service/Service.html?id=4'">
            <img src="images/service4.jpg" alt="Business Card Design" class="post-image">
            <div class="post-details">
                <h3>Business Card Design</h3>
                <div class="price-rating">
                    <span class="price">$300</span>
                    <div class="rating">⭐ 4.7</div>
                </div>
                <div class="provider-info">
                    <img src="images/provider4.jpg" alt="Lina Mahmoud" class="provider-image">
                    <span>Lina Mahmoud</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3>Contact Us</h3>
                <p>Email: info@sanaa.com</p>
                <p>Phone: +1 234 567 890</p>
            </div>
            <div class="footer-section">
                <h3>Follow Us</h3>
                <div class="social-links">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="https://x.com" class="x-icon" target="_blank" rel="noopener noreferrer">
                        <img src="images/twitter.png" alt="X (Twitter)" class="x-logo">
                    </a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2025 Sana'a. All rights reserved</p>
        </div>
    </footer>

    <!-- Link to external JavaScript file -->
    <script src="post.js"></script>
</body>
</html>
