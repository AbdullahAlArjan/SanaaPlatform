<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Service - Sana'a</title>
    <link rel="stylesheet" href="servicestyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <div class="logo">
            <a href="../../../../main page/index.html" class="logo">Sana'a</a>
        </div>
        
    </nav>

    <div class="backbtn">
            <a href="../Service1/Service.html" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Service
            </a>
        </div>

    <div class="report-container">
        <div class="report-header">
            <h1><i class="fas fa-flag"></i> Report Service</h1>
            <div class="service-preview">
                <img src="image/logo1.png" alt="Service Preview">
                <div class="service-info">
                    <h2>Logo Design</h2>
                    <p>by Abd</p>
                </div>
            </div>
        </div>

        <form id="report-form">
            

            <div class="form-group">
                <label for="report-details">Reason for Report (required)</label>
                <textarea id="report-details" placeholder="Please provide as much detail as possible..." required></textarea>
            </div>

            <div class="form-group">
                <label for="report-attachment">Attachment (optional)</label>
                <input type="file" id="report-attachment">
                <small>You can upload screenshots or other supporting documents</small>
            </div>

            <div class="btnn">
                <button type="submit" >Submit Report</button>
                <button type="button"  onclick="window.location.href='../Service.html'">Cancel</button>
            </div>

            <div class="report-notice">
                <i class="fas fa-info-circle"></i> Your report will be reviewed by our team within 24 hours.
            </div>
        </form>
    </div>

    <script src="servicejs.js"></script>
</body>
</html>
