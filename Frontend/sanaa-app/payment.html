<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment — Sanaa Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/globals.css" />
  <link rel="stylesheet" href="css/public.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <!-- Stripe.js -->
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>

  <nav class="pub-nav">
    <div class="pub-nav-inner">
      <a href="index.html" class="nav-brand">San<span>aa</span></a>
      <div class="nav-user" id="navUser"></div>
    </div>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <div class="payment-page">
    <a href="javascript:history.back()" style="display:inline-flex;align-items:center;gap:var(--sp-2);font-size:var(--text-sm);color:var(--text-medium);margin-bottom:var(--sp-5);text-decoration:none;">
      <i class="fa-solid fa-arrow-left"></i> Back
    </a>

    <div class="payment-card">

      <div class="payment-header">
        <h2><i class="fa-solid fa-lock" style="margin-right:var(--sp-2);font-size:1.2rem;"></i>Secure Payment</h2>
        <p>Order #<span id="orderIdLabel">—</span></p>
        <div class="amount-badge"><span>JD</span><span id="amountLabel">—</span></div>
      </div>

      <div class="payment-body" id="formBody">
        <form id="paymentForm" novalidate>

          <div class="form-group">
            <label>Card Details</label>
            <div id="card-element"></div>
            <div id="card-errors" role="alert"></div>
          </div>

          <div id="formAlert" class="alert" style="display:none;margin-top:var(--sp-4);"></div>

          <button type="submit" class="btn btn-primary btn-lg" id="payBtn" style="width:100%;margin-top:var(--sp-5);">
            <i class="fa-solid fa-lock"></i> Pay <span id="payBtnAmt">—</span>
          </button>

          <div class="security-note">
            <i class="fa-brands fa-stripe" style="font-size:1.1rem;color:#635bff;"></i>
            Secured by Stripe. Your card info never touches our servers.
          </div>
        </form>
      </div>

      <div class="success-state" id="successState">
        <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
        <h3>Payment Successful!</h3>
        <p>Your payment has been processed. The freelancer has been notified.</p>
        <div style="display:flex;gap:var(--sp-3);justify-content:center;flex-wrap:wrap;">
          <a href="dashboard-customer.html" class="btn btn-primary">
            <i class="fa-solid fa-grid-2"></i> Dashboard
          </a>
          <a href="#" id="viewInvoiceBtn" class="btn btn-ghost">
            <i class="fa-solid fa-file-invoice"></i> View Invoice
          </a>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="js/payment.js"></script>
</body>
</html>
