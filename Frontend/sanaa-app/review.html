<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave a Review — Sanaa Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/globals.css" />
  <link rel="stylesheet" href="css/public.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

  <nav class="pub-nav">
    <div class="pub-nav-inner">
      <a href="index.html" class="nav-brand">San<span>aa</span></a>
      <div class="nav-user" id="navUser"></div>
    </div>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <div class="review-page">
    <a href="javascript:history.back()" style="display:inline-flex;align-items:center;gap:var(--sp-2);font-size:var(--text-sm);color:var(--text-medium);margin-bottom:var(--sp-5);text-decoration:none;">
      <i class="fa-solid fa-arrow-left"></i> Back
    </a>

    <div class="review-card">
      <div class="review-header">
        <h2><i class="fa-solid fa-star" style="margin-right:var(--sp-2);"></i>Leave a Review</h2>
        <p>Share your experience with this freelancer</p>
        <div class="freelancer-chip" id="freelancerChip" style="display:none;">
          <i class="fa-solid fa-user-tie"></i>
          <span id="freelancerChipName"></span>
        </div>
      </div>

      <div class="review-body" id="formBody">
        <form id="reviewForm" novalidate>

          <div style="font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:var(--sp-3);">Your Rating</div>
          <div class="star-picker" id="starPicker">
            <button type="button" class="star-btn" data-val="1"><i class="fa-solid fa-star"></i></button>
            <button type="button" class="star-btn" data-val="2"><i class="fa-solid fa-star"></i></button>
            <button type="button" class="star-btn" data-val="3"><i class="fa-solid fa-star"></i></button>
            <button type="button" class="star-btn" data-val="4"><i class="fa-solid fa-star"></i></button>
            <button type="button" class="star-btn" data-val="5"><i class="fa-solid fa-star"></i></button>
          </div>
          <div class="star-label" id="starLabel">Click to rate</div>

          <div class="form-group" style="margin-top:var(--sp-5);">
            <label for="comment">Your Review <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
            <textarea id="comment" class="form-control" rows="4"
              placeholder="Describe your experience — quality of work, communication, punctuality…"
              maxlength="800"></textarea>
          </div>

          <div id="formAlert" class="alert" style="display:none;margin-top:var(--sp-4);"></div>

          <button type="submit" class="btn btn-lg" id="submitBtn"
            style="width:100%;margin-top:var(--sp-5);background:#f39c12;color:#fff;border-color:#f39c12;">
            <i class="fa-solid fa-paper-plane"></i> Submit Review
          </button>
        </form>
      </div>

      <div class="success-state" id="successState">
        <div class="success-icon"><i class="fa-solid fa-star"></i></div>
        <h3>Review Submitted!</h3>
        <p>Thank you for your feedback. It helps others make better decisions.</p>
        <a href="dashboard-customer.html" class="btn btn-primary">
          <i class="fa-solid fa-grid-2"></i> Back to Dashboard
        </a>
      </div>
    </div>
  </div>

  <script type="module" src="js/review.js"></script>
</body>
</html>
