<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Settings — Sanaa Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/globals.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<div class="dash-shell">
  <!-- Sidebar -->
  <aside class="dash-sidebar" id="dashSidebar">
    <div class="sidebar-brand">
      <a href="index.html" style="text-decoration:none;"><h1>San<span>aa</span></h1></a>
    </div>
    <div class="sidebar-user">
      <div class="avatar-placeholder avatar-md" id="sidebarAvatar" style="font-size:0.85rem;flex-shrink:0;"></div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="sidebarName">…</div>
        <div class="sidebar-user-role" id="sidebarRole">…</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Navigation</div>
      <a href="#" id="dashLink" class="sidebar-link"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
      <a href="profile-settings.html" class="sidebar-link active"><i class="fa-solid fa-user-pen"></i> Profile Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-logout" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket"></i> Log Out
      </button>
    </div>
  </aside>

  <div class="dash-main">
    <header class="dash-topbar">
      <div class="topbar-title">Profile Settings</div>
      <div class="topbar-actions">
        <div class="topbar-notif" id="notifBell"><i class="fa-regular fa-bell"></i><span class="notif-count" id="notifCount">0</span></div>
      </div>
    </header>

    <div class="dash-body">
      <div class="settings-grid">

        <!-- Left: avatar card -->
        <div>
          <div class="dash-card" style="text-align:center; padding:var(--sp-7) var(--sp-5);">
            <div class="avatar-upload-wrap">
              <div class="avatar-circle" id="avatarCircle"></div>
              <label class="avatar-upload-btn" for="avatarInput" title="Change photo">
                <i class="fa-solid fa-camera"></i>
              </label>
              <input type="file" id="avatarInput" accept="image/*" style="display:none;" />
            </div>
            <div style="font-size:var(--text-lg);font-weight:700;color:var(--text-dark);" id="cardName">—</div>
            <div style="font-size:var(--text-sm);color:var(--text-muted);margin-top:4px;" id="cardRole">—</div>
            <div style="font-size:var(--text-xs);color:var(--text-muted);margin-top:var(--sp-2);" id="cardEmail">—</div>
            <div id="uploadStatus" style="margin-top:var(--sp-3);font-size:var(--text-xs);"></div>
          </div>
        </div>

        <!-- Right: tabs -->
        <div class="dash-card">
          <div style="padding:var(--sp-6) var(--sp-6) 0;">
            <div class="tab-nav">
              <button class="tab-btn active" data-tab="info">Personal Info</button>
              <button class="tab-btn" data-tab="security" id="securityTabBtn">Change Password</button>
            </div>
          </div>

          <!-- Info tab -->
          <div class="tab-panel active" id="tab-info" style="padding:0 var(--sp-6) var(--sp-6);">
            <form id="infoForm" novalidate>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);">
                <div class="form-group">
                  <label>Full Name</label>
                  <input type="text" id="fullName" class="form-control" placeholder="Your full name" />
                </div>
                <div class="form-group">
                  <label>Phone Number</label>
                  <input type="tel" id="phone" class="form-control" placeholder="+962 7X XXX XXXX" />
                </div>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);">
                <div class="form-group">
                  <label>City</label>
                  <select id="city" class="form-control">
                    <option value="">Select city…</option>
                    <option>Amman</option><option>Zarqa</option><option>Irbid</option>
                    <option>Aqaba</option><option>Salt</option><option>Madaba</option>
                    <option>Karak</option><option>Tafilah</option><option>Ma'an</option>
                    <option>Jerash</option><option>Ajloun</option><option>Mafraq</option>
                    <option>Balqa</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Gender</label>
                  <select id="gender" class="form-control">
                    <option value="">Select…</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" disabled
                  style="background:var(--bg-light);color:var(--text-muted);cursor:not-allowed;" />
                <small style="color:var(--text-muted);font-size:var(--text-xs);">Email cannot be changed.</small>
              </div>
              <div id="infoAlert" class="alert" style="display:none;margin-top:var(--sp-4);"></div>
              <button type="submit" class="btn btn-primary" id="saveInfoBtn" style="margin-top:var(--sp-2);">
                <i class="fa-solid fa-floppy-disk"></i> Save Changes
              </button>
            </form>
          </div>

          <!-- Security tab -->
          <div class="tab-panel" id="tab-security" style="padding:0 var(--sp-6) var(--sp-6);">
            <p style="font-size:var(--text-sm);color:var(--text-muted);margin-bottom:var(--sp-5);">
              To change your password, use the forgot password flow — enter your email and we'll send a reset code.
            </p>
            <a href="forgot-password.html" class="btn btn-outline">
              <i class="fa-solid fa-key"></i> Reset Password via Email
            </a>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
<div class="toast-container" id="toastContainer"></div>

<script type="module" src="js/profile-settings.js"></script>
</body>
</html>
